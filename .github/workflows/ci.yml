name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore .NET
        run: dotnet restore OpsFlow.sln

      - name: Build .NET
        run: dotnet build OpsFlow.sln --configuration Release --no-restore

      - name: Test .NET
        run: dotnet test OpsFlow.sln --configuration Release --no-build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/OpsFlow.Web/package-lock.json

      - name: Install Angular dependencies
        working-directory: src/OpsFlow.Web
        run: npm ci

      - name: Build Angular
        working-directory: src/OpsFlow.Web
        run: npm run build
